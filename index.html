<!DOCTYPE html>
<html>
<head>
  <title>IoT Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">
<div class="container mt-4">

  <h2>Monitoring IoT</h2>

  <button onclick="startLogging()" class="btn btn-success">Start</button>
  <button onclick="stopLogging()" class="btn btn-danger">Stop</button>

  <input type="number" id="delay" placeholder="Delay ms">
  <button onclick="setDelay()" class="btn btn-warning">Set Delay</button>

  <table class="table table-dark mt-3">
    <thead>
      <tr>
        <th>Waktu</th>
        <th>Suhu</th>
        <th>Kelembapan</th>
        <th>Lux</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

</div>

<script>
let running = true;
let delay = 5000;

function startLogging() {
  running = true;
}

function stopLogging() {
  running = false;
}

function setDelay() {
  delay = document.getElementById("delay").value;
}

async function fetchData() {
  if (!running) return;

  let res = await fetch("LINK_CSV_GOOGLE_SHEET");
  let data = await res.text();

  let rows = data.split("\n");
  let table = document.getElementById("data");
  table.innerHTML = "";

  rows.slice(-10).forEach(row => {
    let col = row.split(",");
    table.innerHTML += `
      <tr>
        <td>${col[0]}</td>
        <td>${col[1]}</td>
        <td>${col[2]}</td>
        <td>${col[3]}</td>
      </tr>
    `;
  });
}

setInterval(fetchData, delay);
</script>

</body>
</html>
