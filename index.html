<!DOCTYPE html>
<html>
<head>
  <title>Monitoring IoT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h2 {
      margin-top: 20px;
    }

    .card {
      display: inline-block;
      background: white;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 120px;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    td, th {
      border: 1px solid black;
      padding: 8px;
    }

    button {
      padding: 10px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>📡 Monitoring ESP32</h2>

<!-- 🔥 DATA SENSOR -->
<div class="card">
  <h3>Suhu</h3>
  <p id="suhu">-</p>
</div>

<div class="card">
  <h3>Kelembapan</h3>
  <p id="kelembapan">-</p>
</div>

<div class="card">
  <h3>LDR</h3>
  <p id="ldr">-</p>
</div>

<br>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<!-- 📊 TABEL -->
<table id="tabel">
  <tr>
    <th>Waktu</th>
    <th>Suhu</th>
    <th>Kelembapan</th>
    <th>LDR</th>
  </tr>
</table>

<script>
let interval;

function ambilData() {
  fetch("https://script.google.com/macros/s/AKfycbyhtB0PRELq-WcrKSFT_wFSHUROsQtrWaE3-j3bIr_sbkJDsvQmE18_Rdh_FROWdXDmEA/exec")
  .then(res => res.json())
  .then(data => {

    let table = document.getElementById("tabel");

    // reset tabel
    table.innerHTML = `
      <tr>
        <th>Waktu</th>
        <th>Suhu</th>
        <th>Kelembapan</th>
        <th>LDR</th>
      </tr>
    `;

    if (data.length > 0) {
      let last = data[data.length - 1];

      document.getElementById("suhu").innerText = last[1];
      document.getElementById("kelembapan").innerText = last[2];
      document.getElementById("ldr").innerText = last[3];
    }

    // isi tabel
    data.forEach(row => {
      let tr = "<tr>";
      row.forEach(cell => {
        tr += "<td>" + cell + "</td>";
      });
      tr += "</tr>";
      table.innerHTML += tr;
    });

  })
  .catch(err => {
    console.log("Error:", err);
  });
}

function start() {
  ambilData(); // langsung ambil pertama
  interval = setInterval(ambilData, 3000);
}

function stop() {
  clearInterval(interval);
}
</script>

</body>
</html>
